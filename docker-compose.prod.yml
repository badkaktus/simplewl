services:
  simplewl-blue:
    image: ghcr.io/${GITHUB_USER}/simplewl:${BLUE_VERSION:-latest}
    container_name: simplewl-blue
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL}
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/storage/database/database.sqlite
      - CACHE_STORE=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=sync
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN:-}
      - MAILGUN_SECRET=${MAILGUN_SECRET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_ID=${GITHUB_ID:-}
      - GITHUB_SECRET=${GITHUB_SECRET:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - SENTRY_LARAVEL_DSN=${SENTRY_LARAVEL_DSN:-}
      - CONTAINER_COLOR=blue
    volumes:
      - ./storage:/var/www/html/storage
    networks:
      - proxy
    labels:
      - "caddy.enable=true"
      - "deployment.color=blue"
      - "deployment.version=${BLUE_VERSION}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "deployment.color,deployment.version"

  simplewl-green:
    image: ghcr.io/${GITHUB_USER}/simplewl:${GREEN_VERSION:-latest}
    container_name: simplewl-green
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL}
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/storage/database/database.sqlite
      - CACHE_STORE=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=sync
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN:-}
      - MAILGUN_SECRET=${MAILGUN_SECRET:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_ID=${GITHUB_ID:-}
      - GITHUB_SECRET=${GITHUB_SECRET:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - SENTRY_LARAVEL_DSN=${SENTRY_LARAVEL_DSN:-}
      - CONTAINER_COLOR=green
    volumes:
      - ./storage:/var/www/html/storage
    networks:
      - proxy
    labels:
      - "caddy.enable=false"
      - "deployment.color=green"
      - "deployment.version=${GREEN_VERSION}"
    profiles:
      - green
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "deployment.color,deployment.version"

networks:
  proxy:
    external: true
